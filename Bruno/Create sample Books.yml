info:
  name: Create sample Books
  type: http
  seq: 1

http:
  method: POST
  url: localhost:8080/api/books
  body:
    type: json
    data: |-
      {
        "title": "Go Set a Watchman",
        "author": "Harper Lee",
        "genre": "Fiction",
        "publicationYear": 2015
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const axios = require("axios");

        const books = [
          { title: "The Hobbit", author: "J.R.R. Tolkien", genre: "Fantasy", publicationYear: 1937 },
          { title: "The Fellowship of the Ring", author: "J.R.R. Tolkien", genre: "Fantasy", publicationYear: 1954 },
          { title: "The Two Towers", author: "J.R.R. Tolkien", genre: "Fantasy", publicationYear: 1954 },
          { title: "Animal Farm", author: "George Orwell", genre: "Dystopian", publicationYear: 1945 },
          { title: "Nineteen Eighty-Four", author: "George Orwell", genre: "Dystopian", publicationYear: 1949 },
          { title: "Down and Out in Paris and London", author: "George Orwell", genre: "Memoir", publicationYear: 1933 },
          { title: "Harry Potter and the Sorcerer's Stone", author: "J.K. Rowling", genre: "Fantasy", publicationYear: 1997 },
          { title: "Harry Potter and the Chamber of Secrets", author: "J.K. Rowling", genre: "Fantasy", publicationYear: 1998 },
          { title: "To Kill a Mockingbird", author: "Harper Lee", genre: "Fiction", publicationYear: 1960 }
        ];

        for (const book of books) {
          try {
            await axios.post("http://localhost:8080/api/books", book);
          } catch (error) {
            console.error("Failed to create book: " + book.title, error.message);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
