info:
  name: Create Book
  type: http
  seq: 10

http:
  method: POST
  url: localhost:8080/api/books
  body:
    type: json
    data: |-
      {
        "title": "Go Set a Watchman",
        "author": "Harper Lee",
        "genre": "Fiction",
        "publicationYear": 2015
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
